name: CI

on:
  push:
    branches: [main]
  pull_request:

jobs:
  test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4
      - uses: pnpm/action-setup@v4
        with:
          version: 11
      - uses: actions/setup-node@v4
        with:
          node-version: 24
          cache: pnpm
      - run: pnpm install --frozen-lockfile
      - run: pnpm typecheck
      - run: pnpm test
      # Task audit: every task's held-out tests must FAIL on the pristine
      # workspace and PASS on the reference solution.
      - run: pnpm arena verify

  harbor-adapter:
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: harbor
    steps:
      - uses: actions/checkout@v4
      - uses: actions/setup-python@v5
        with:
          python-version: "3.12"  # Harbor requires >= 3.12
          cache: pip
      - run: pip install -e '.[dev]'
      # Spec/metrics/command logic is Harbor-free; the agent tests exercise the
      # real Harbor BaseInstalledAgent subclasses (Harbor is a declared dep).
      - run: pytest -q
