<svg xmlns="http://www.w3.org/2000/svg" viewBox="0 0 64 64" fill="none" role="img" aria-label="Arena mark: two nested stadium shapes">
  <!-- The geometric "stadium" (a rectangle capped by semicircles): the outer
       bowl and the inner field, drawn as plain strokes. -->
  <rect x="3" y="17" width="58" height="30" rx="15" stroke="#131312" stroke-width="4"/>
  <rect x="15" y="26" width="34" height="12" rx="6" stroke="#131312" stroke-width="4"/>
  <line x1="32" y1="26" x2="32" y2="38" stroke="#131312" stroke-width="4"/>
</svg>
